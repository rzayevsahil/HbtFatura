<div class="page-header">
  <h1 class="page-title">{{ id ? 'Ürün Düzenle' : 'Yeni Ürün' }}</h1>
</div>
@if (id && editLoading) {
<div class="loading-container">
  <div class="spinner"></div>
  <p>Veriler yükleniyor...</p>
</div>
} @else {
<div class="card">
  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="form-grid">
      @if (auth.user()?.role === 'SuperAdmin' && !id) {
      <div class="row">
        <label>Firma</label>
        <select formControlName="firmId" required>
          <option [ngValue]="null">Firma seçin</option>
          @for (f of firms; track f.id) {
          <option [ngValue]="f.id">{{ f.name }}</option>
          }
        </select>
      </div>
      }
      <div class="row">
        <label>Kod</label>
        <input formControlName="code" placeholder="Ürün kodu" />
        @if (form.controls.code.errors?.['duplicateCode']) {
        <small class="error-msg">Bu kod zaten kullanılıyor.</small>
        }
      </div>
      <div class="row">
        <label>Ad</label>
        <input formControlName="name" placeholder="Ürün adı" />
      </div>
      <div class="row">
        <label>Barkod</label>
        <input formControlName="barcode" placeholder="İsteğe bağlı" />
      </div>
      <div class="row">
        <label>Birim</label>
        <app-unit-field-select [itemGroup]="form" emptyLabel="Birim seçin" />
      </div>

      <div class="row">
        <label>Mevcut Stok</label>
        <input type="number" formControlName="stockQuantity" step="0.01" />
      </div>
      <div class="row">
        <label>Birim Fiyat</label>
        <input type="number" formControlName="unitPrice" step="0.01" />
      </div>
      <div class="row">
        <label>Para Birimi</label>
        <select formControlName="currency">
          @for (c of currencies; track c.id) {
          <option [value]="c.code">{{ c.name }} ({{ c.code }})</option>
          }
        </select>
      </div>
      @if (error) { <p class="error-msg">{{ error }}</p> }
    </div>
    <div class="actions">
      <button type="submit" [disabled]="form.invalid || saving">Kaydet</button>
      <a routerLink="/products">İptal</a>
    </div>
  </form>
</div>
}
