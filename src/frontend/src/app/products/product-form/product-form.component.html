<div class="page-header">
  <h1 class="page-title">{{ id ? 'Ürün Düzenle' : 'Yeni Ürün' }}</h1>
</div>
@if (id && editLoading) {
<div class="loading-container">
  <div class="spinner"></div>
  <p>Veriler yükleniyor...</p>
</div>
} @else {
<div class="card">
  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="form-grid">
      @if (auth.user()?.role === 'SuperAdmin' && !id) {
      <div class="row">
        <label>Firma</label>
        <app-searchable-select
          formControlName="firmId"
          [options]="firmSearchableOptions"
          [showNoneOption]="true"
          noneOptionLabel="Firma seçin"
          placeholder="Firma seçin"
          searchPlaceholder="Firma ara…"
          noResultsLabel="Sonuç yok"
        />
      </div>
      }
      <div class="row">
        <label>Kod</label>
        <input formControlName="code" placeholder="Ürün kodu" />
        @if (form.controls.code.errors?.['duplicateCode']) {
        <small class="error-msg">Bu kod zaten kullanılıyor.</small>
        }
      </div>
      <div class="row">
        <label>Ad</label>
        <input formControlName="name" placeholder="Ürün adı" />
      </div>
      <div class="row">
        <label>Barkod</label>
        <input formControlName="barcode" placeholder="İsteğe bağlı" />
      </div>
      <div class="row">
        <label>Stok Türü</label>
        <app-searchable-select
          formControlName="stockType"
          [options]="stockTypeSearchableOptions"
          placeholder="Seçin"
          searchPlaceholder="Ara…"
          noResultsLabel="Sonuç yok"
        />
      </div>
      <div class="row">
        <label>Birim</label>
        <app-searchable-select
          formControlName="unit"
          [options]="unitSearchableOptions"
          placeholder="Birim seçin"
          searchPlaceholder="Ara…"
          noResultsLabel="Sonuç yok"
        />
      </div>

      <div class="row">
        <label>Mevcut Stok</label>
        <input type="number" formControlName="stockQuantity" step="0.01" />
      </div>
      <div class="row">
        <label>Birim Fiyat</label>
        <input type="number" formControlName="unitPrice" step="0.01" />
      </div>
      <div class="row">
        <label>Para Birimi</label>
        <app-searchable-select
          formControlName="currency"
          [options]="currencySearchableOptions"
          placeholder="Seçin"
          searchPlaceholder="Ara…"
          noResultsLabel="Sonuç yok"
        />
      </div>
      @if (error) { <p class="error-msg">{{ error }}</p> }
    </div>
    <div class="actions">
      <button type="submit" [disabled]="form.invalid || saving">Kaydet</button>
      <a routerLink="/products">İptal</a>
    </div>
  </form>
</div>
}
