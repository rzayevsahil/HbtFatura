<div class="page-header">
  <h1 class="page-title">{{ id ? 'Çalışanı Düzenle' : 'Yeni Çalışan' }}</h1>
  <p class="page-subtitle">{{ id ? 'Çalışan bilgilerini güncelleyin.' : 'Firmanıza yeni çalışan hesabı ekleyin.' }}</p>
</div>
<div class="card">
  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="form-grid">
      <div class="row">
        <label>E-posta</label>
        <input type="email" formControlName="email" placeholder="calisan&#64;firma.com" />
      </div>
      <div class="row">
        <label>Şifre</label>
        <input type="password" formControlName="password" placeholder="En az 6 karakter" />
        @if (id) {
        <small class="help-text">Şifreyi değiştirmek istemiyorsanız boş bırakın.</small>
        }
      </div>
      <div class="row">
        <label>Ad Soyad</label>
        <input formControlName="fullName" placeholder="Ad Soyad" />
      </div>
      @if (error) { <p class="error-msg">{{ error }}</p> }
    </div>
    <div class="actions">
      <button class="btn btn-primary" type="submit" [disabled]="form.invalid || saving">
        {{ id ? 'Güncelle' : 'Oluştur' }}
      </button>
      <a routerLink="/employees">İptal</a>
    </div>
  </form>
</div>
