<div class="auth-page">
  <button type="button" class="auth-theme-toggle" (click)="theme.toggle()"
    [attr.aria-label]="theme.darkMode() ? 'Açık temaya geç' : 'Koyu temaya geç'" title="Tema">
    <span class="material-icons" aria-hidden="true">{{ theme.darkMode() ? 'light_mode' : 'dark_mode' }}</span>
  </button>
  <div class="auth-box">
    <h1>Giriş</h1>
    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="field">
        <label>E-posta</label>
        <input type="email" formControlName="email" placeholder="ornek@firma.com" />
      </div>
      <div class="field">
        <label>Şifre</label>
        <div class="password-input">
          <input [type]="showPassword ? 'text' : 'password'" formControlName="password" placeholder="••••••••" />
          <button type="button" class="toggle-password" (click)="showPassword = !showPassword" tabindex="-1">
            @if (showPassword) {
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
              class="lucide lucide-eye-off">
              <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24" />
              <path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68" />
              <path d="M6.61 6.61A13.52 13.52 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61" />
              <line x1="2" x2="22" y1="2" y2="22" />
            </svg>
            } @else {
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
              class="lucide lucide-eye">
              <path
                d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0z" />
              <circle cx="12" cy="12" r="3" />
            </svg>
            }
          </button>
        </div>
      </div>
      @if (error) { <p class="error">{{ error }}</p> }
      <button type="submit" [disabled]="form.invalid || loading">
        @if (loading) {
        <span class="btn-content">
          <svg class="spinner-sm" viewBox="0 0 24 24">
            <circle class="path" cx="12" cy="12" r="10" fill="none" stroke-width="3"></circle>
          </svg>
          Giriş yapılıyor...
        </span>
        } @else {
        Giriş
        }
      </button>
    </form>
  </div>
</div>
