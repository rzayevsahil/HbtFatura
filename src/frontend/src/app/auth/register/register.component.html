<div class="auth-page">
  <div class="auth-top-bar">
    <div class="lang-switcher" role="group" [attr.aria-label]="'app.langPickAria' | translate">
      <button type="button" class="lang-switcher-btn" [class.active]="isLang('tr')" (click)="setLang('tr')"
        [attr.aria-pressed]="isLang('tr')">{{ 'app.langTurkish' | translate }}</button>
      <button type="button" class="lang-switcher-btn" [class.active]="isLang('en')" (click)="setLang('en')"
        [attr.aria-pressed]="isLang('en')">{{ 'app.langEnglish' | translate }}</button>
    </div>
  </div>
  <button type="button" class="auth-theme-toggle" (click)="theme.toggle()"
    [attr.aria-label]="(theme.darkMode() ? 'app.themeLightAria' : 'app.themeDarkAria') | translate"
    [title]="'app.themeTitle' | translate">
    <span class="material-icons" aria-hidden="true">{{ theme.darkMode() ? 'light_mode' : 'dark_mode' }}</span>
  </button>
  <div class="auth-box">
    <h1>{{ 'auth.registerTitle' | translate }}</h1>
    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="field">
        <label>{{ 'auth.fullName' | translate }}</label>
        <input type="text" formControlName="fullName" [placeholder]="'auth.fullNamePlaceholder' | translate" />
      </div>
      <div class="field">
        <label>{{ 'auth.email' | translate }}</label>
        <input type="email" formControlName="email" [placeholder]="'auth.emailPlaceholder' | translate" />
      </div>
      <div class="field">
        <label>{{ 'auth.password' | translate }}</label>
        <input type="password" formControlName="password" [placeholder]="'auth.passwordMinPlaceholder' | translate" />
      </div>
      @if (error) { <p class="error">{{ error }}</p> }
      <button type="submit" [disabled]="form.invalid || loading">{{ 'auth.registerSubmit' | translate }}</button>
    </form>
    <p class="auth-footer"><a routerLink="/login">{{ 'auth.goToLogin' | translate }}</a></p>
  </div>
</div>
