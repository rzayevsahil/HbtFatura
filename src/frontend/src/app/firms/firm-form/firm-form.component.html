<div class="page-header">
  <h1 class="page-title">{{ 'firmForm.title' | translate }}</h1>
  <p class="page-subtitle">{{ 'firmForm.subtitle' | translate }}</p>
</div>
<div class="card">
  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="form-grid">
      <div class="row">
        <label>{{ 'firmForm.companyName' | translate }}</label>
        <input formControlName="name" [placeholder]="'firmForm.companyNamePlaceholder' | translate" />
      </div>
      <div class="row">
        <label>{{ 'firmForm.adminEmail' | translate }}</label>
        <input type="email" formControlName="adminEmail" [placeholder]="'firmForm.adminEmailPlaceholder' | translate" />
      </div>
      <div class="row">
        <label>{{ 'firmForm.adminPassword' | translate }}</label>
        <input type="password" formControlName="adminPassword" [placeholder]="'firmForm.adminPasswordPlaceholder' | translate" />
      </div>
      <div class="row">
        <label>{{ 'firmForm.adminFullName' | translate }}</label>
        <input formControlName="adminFullName" [placeholder]="'firmForm.adminFullNamePlaceholder' | translate" />
      </div>
      @if (error) { <p class="error-msg">{{ error }}</p> }
    </div>
    <div class="actions">
      <button type="submit" [disabled]="form.invalid || saving">{{ 'firmForm.create' | translate }}</button>
      <a routerLink="/firms">{{ 'common.cancel' | translate }}</a>
    </div>
  </form>
</div>
